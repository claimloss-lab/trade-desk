name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'functions/**'
      - '!public/portfolio-data.json'
      - '!public/daily-snapshot.json'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 29fd496b261d2fc7cd16535cad12f5d4
          command: pages deploy public --project-name=trade-desk
