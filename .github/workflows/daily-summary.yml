name: Daily Portfolio Summary (LINE)

on:
  schedule:
    - cron: '30 0 * * *'   # 00:30 UTC = 07:30 ICT (เผื่อ delay ถึง 08:00)
  workflow_dispatch:        # รันมือได้จาก GitHub Actions tab

jobs:
  send-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily summary
        run: |
          echo "=== Calling daily-summary ==="
          curl -s -X GET "https://trade-desk.pages.dev/api/daily-summary" \
            --max-time 30 -w "\nHTTP_STATUS:%{http_code}" | tee /tmp/response.txt
          echo ""
          cat /tmp/response.txt
